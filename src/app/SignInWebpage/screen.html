<!DOCTYPE html><html lang="en" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SRY Studio Premium Login</title>
<!-- Tailwind CSS v3 CDN -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts for Serif and Sans-Serif styles -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              cream: '#fdfbf2',
              purple: '#5e00b8',
              border: '#dcd8c9',
            }
          },
          fontFamily: {
            serif: ['"Crimson Pro"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          }
        }
      }
    }
  </script>
<!-- BEGIN: Custom Styles -->
<style data-purpose="background-styles">body {
      background-color: #0b1121;
      background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuD-46YW63P-owhUgHl73-mk50Dcab5G8jEDO2DkIPgUIw9OAASmQRq7vfxxRV3sNruLDEZeJMjpbQwC3Tn-eOvExBU7brDbnd-y2RbiYkaEtE5UjzBLHabBDRm2OIDTbVRrseNTihWKHBLHLCT2xIdz4fD3l5yy5nhEdQr8SjsVyRz5HIgFS0jG48WBi6IUPh67RmsWXZIYQCvrvmFZ21vs5cGPbVJ8w5m_IEtAHk5f9j4iug_y1n1cYjupeEJ8b-GCzOOKf1oxf6E');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
      z-index: -1;
    }</style>
<style data-purpose="typography-and-spacing">
    .card-title {
      line-height: 1.1;
      letter-spacing: -0.02em;
    }
    
    .social-btn {
      transition: background-color 0.2s ease;
    }
    
    .social-btn:hover {
      background-color: rgba(0, 0, 0, 0.02);
    }

    .input-underline {
      border: none;
      border-bottom: 1px solid #c4c4c4;
      border-radius: 0;
      padding-left: 0;
      padding-right: 0;
    }

    .input-underline:focus {
      outline: none;
      box-shadow: none;
      border-bottom-color: #5e00b8;
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="font-sans text-gray-900 antialiased p-4">
<div class="bg-overlay"></div>
<!-- BEGIN: LoginCard -->
<main class="w-full max-w-md bg-brand-cream rounded-xl shadow-2xl overflow-hidden py-12 px-10 md:px-14 flex flex-col items-center" data-purpose="login-container">
<!-- Header Branding -->
<div class="text-center mb-8" data-purpose="card-header">
<img alt="SRY Studio Logo" class="h-12 w-auto mb-6 mx-auto" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAnWfSQLAEAm1Yp504JzoQEypLymV4xSJkegvjenSIxybZxRxAMPh_1p3_CjDrt9Yxut40qTLemfMv3PVv3NF1_YFYgTaqF9AXzQD5r4G8o6R6qfNowSbuX6RHeMpicF7BBnB0zpjv_95rFNxXaSMBrNw0Xyrfsc2CJvigL8XnSzYjB-C09aWzrBp6VmDLmyJ3ePsqaCLlR8dmUHZH5Sokmfjn4m6Argm_PROtEDR7OMWzI9VcXxjn-Eo_TjtlY3exb4bJXUqj0K5E">
<h1 class="font-serif text-[32px] font-semibold text-gray-900 leading-tight">Log in to SRY Studio</h1>
</div>
<!-- Social Login Section -->
<div class="w-full space-y-3 mb-6" data-purpose="social-auth-buttons">
<!-- Google -->
<button class="social-btn w-full flex items-center justify-center gap-3 py-2.5 px-4 border border-brand-border rounded-lg text-sm font-medium text-gray-700 bg-transparent">
<svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"></path><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"></path></svg>
        Continue with Google
      </button>
<!-- Apple -->
<button class="social-btn w-full flex items-center justify-center gap-3 py-2.5 px-4 border border-brand-border rounded-lg text-sm font-medium text-gray-700 bg-transparent">
<svg class="w-[18px] h-[18px]" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.59 9.05 7.31c1.35.05 2.26.71 3.03.71.72 0 1.95-.82 3.41-.66 1.48.16 2.58.74 3.23 1.69-3.04 1.76-2.52 5.92.51 7.15-.71 1.83-1.6 3.44-2.18 4.08zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.37-1.89 4.31-3.74 4.25z"></path></svg>
        Continue with Apple
      </button>
<!-- Microsoft -->
<button class="social-btn w-full flex items-center justify-center gap-3 py-2.5 px-4 border border-brand-border rounded-lg text-sm font-medium text-gray-700 bg-transparent">
<svg class="w-[18px] h-[18px]" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.4 24H0V12.6h11.4V24zM24 24H12.6V12.6H24V24zM11.4 11.4H0V0h11.4v11.4zm12.6 0H12.6V0H24v11.4z" fill="#f3f3f3"></path><path d="M11.4 24H0V12.6h11.4V24z" fill="#00a4ef"></path><path d="M24 24H12.6V12.6H24V24z" fill="#ffb900"></path><path d="M11.4 11.4H0V0h11.4v11.4z" fill="#f25022"></path><path d="M24 11.4H12.6V0H24v11.4z" fill="#7fba00"></path></svg>
        Continue with Microsoft
      </button>
<!-- SSO -->

</div>
<!-- Divider -->
<div class="w-full flex items-center gap-4 mb-8" data-purpose="divider">
<div class="h-[1px] flex-grow bg-brand-border"></div>
<span class="text-xs text-gray-400 uppercase tracking-wider font-medium">or</span>
<div class="h-[1px] flex-grow bg-brand-border"></div>
</div>
<!-- Email Form Section -->
<form class="w-full" data-purpose="login-form">
<div class="mb-10">
<input class="input-underline w-full bg-transparent text-gray-700 placeholder-gray-400 py-2" placeholder="Enter your email" required="" type="email">
</div>
<button class="w-full hover:bg-opacity-90 text-white font-semibold py-3.5 rounded-lg transition-all duration-200 bg-black" type="submit">
        Continue
      </button>
</form>
</main>
<!-- END: LoginCard -->


</body></html>
