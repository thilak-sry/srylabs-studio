<script>
        // Auto-expand textarea script
        const textarea = document.querySelector('textarea');
        textarea.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.scrollHeight > 150) {
                this.style.overflowY = 'auto';
                this.style.height = '150px';
            } else {
                this.style.overflowY = 'hidden';
            }
        });

        // Image Compare Slider Logic
        const sliderHandle = document.getElementById('slider-handle');
        const sliderAfter = document.getElementById('slider-after');
        const container = document.querySelector('.image-compare-container');
        
        let isDragging = false;

        sliderHandle.addEventListener('mousedown', (e) => {
            isDragging = true;
            document.body.style.cursor = 'ew-resize';
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.style.cursor = 'default';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            
            const rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left;
            
            // Constrain to container
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;
            
            const percentage = (x / rect.width) * 100;
            
            sliderHandle.style.left = `${percentage}%`;
            sliderAfter.style.clipPath = `inset(0 0 0 ${percentage}%)`;
        });
    </script>
