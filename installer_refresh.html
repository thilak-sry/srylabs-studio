<style>
        body {
            font-family: 'Geist', sans-serif;
            background-color: #F6F3F2; /* Custom subtle warm gray for the Ethereal Flow aesthetic */
        }
        
        /* Glassmorphism utility for the main installer card */
        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05);
        }

        /* Subtle animated gradient background for the hero area */
        .hero-gradient {
            background: linear-gradient(135deg, rgba(240, 237, 236, 0.8) 0%, rgba(229, 226, 225, 0.6) 100%);
            position: relative;
            overflow: hidden;
        }
        
        .hero-gradient::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(129, 39, 207, 0.05) 0%, transparent 60%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
